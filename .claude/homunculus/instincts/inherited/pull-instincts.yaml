# Pull Workflow Merge Dependency Update Branch

## Action

Follow the merge-dependency-update-branch workflow:
1. Review the dependency update PR (often includes .github/workflows/ci.yml).
2. Merge the branch into the main branch.
3. Resolve any conflicts if necessary.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .github/workflows/ci.yml

