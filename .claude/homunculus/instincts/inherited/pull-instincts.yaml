# Pull Workflow Update Github Actions Workflow

## Action

Follow the update-github-actions-workflow workflow:
1. Edit .github/workflows/ci.yml to update action versions or workflow configuration.
2. Commit the changes with a message referencing the update (e.g., bumping a dependency).
3. Optionally, merge or pull in related changes from master/main.
4. Merge the pull request or push to main branch.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .github/workflows/ci.yml

