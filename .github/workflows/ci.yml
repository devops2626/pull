name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4    # v4 is more stable than v7 (v7 may not exist yet)
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'               # speeds up installs
      
      - run: npm ci                  # faster, stricter than npm install
      - run: npm test
