name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Add steps to install your dependencies and run tests
      # Example for Node.js:
      - uses: actions/setup-node@v7
        with:
          node-version: '18'
      - run: npm install
      - run: npm test
      # Example for Python:
      # - uses: actions/setup-python@v4
      #   with:
      #     python-version: '3.10'
      # - run: pip install -r requirements.txt
      # - run: pytest
